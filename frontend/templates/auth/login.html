{% extends "base.html" %}
{% block title %}Login - Status Check{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-16">
  <div class="bg-white rounded-xl shadow-lg p-8">
    <h1 class="text-2xl font-bold mb-6 text-center">Sign in</h1>
    {% if error %}
    <div class="mb-4 p-3 bg-red-50 text-red-700 rounded border border-red-200 text-sm">{{ error }}</div>
    {% endif %}
    <form method="post" action="/login" class="space-y-4">
      <div>
        <label class="block text-sm font-medium mb-1" for="email">Email</label>
        <input type="email" id="email" name="email" required
               class="w-full border border-slate-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
      </div>
      <div>
        <label class="block text-sm font-medium mb-1" for="password">Password</label>
        <input type="password" id="password" name="password" required
               class="w-full border border-slate-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
      </div>
      <button type="submit"
              class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 rounded-lg">
        Sign in
      </button>
    </form>
    <p class="mt-6 text-xs text-slate-500 text-center">
      Demo: user@example.com / user123
    </p>
  </div>
</div>
{% endblock %}
